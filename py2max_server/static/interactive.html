<!DOCTYPE html>
<html>
<head>
    <title>py2max Interactive Editor</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* wss://localhost:*; img-src 'self' data:;">
    <style>
        :root {
            --header-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Monaco', 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }

        #header {
            background: linear-gradient(135deg, #2d2d2d 0%, #1e1e1e 100%);
            padding: 8px 16px;
            border-bottom: 2px solid #4080ff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Literal min-height so the measured height feeds --header-height
               without a feedback loop; JS keeps --header-height in sync with the
               header's true (wrapped) height so the sidebar never overlaps it. */
            min-height: 44px;
            position: relative;
            z-index: 200;
            gap: 16px;
        }

        /* Thin, single-row header: title and breadcrumb sit inline and ellipsize
           rather than wrapping, so the header height stays fixed. */
        #header-title {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 14px;
            font-weight: 600;
            color: #4080ff;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        #breadcrumb {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 12px;
            color: #888;
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
        }

        #breadcrumb-path {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .breadcrumb-icon {
            color: #4080ff;
            flex-shrink: 0;
        }

        /* Drag-to-connect feedback */
        .connection-preview { pointer-events: none; }

        /* Compatible target ports light up during a connection drag; the one
           under the cursor gets a stronger ring. */
        .port.connect-compatible {
            stroke: #ffd080;
            stroke-width: 2px;
        }
        .port.connect-hover {
            stroke: #ffffff;
            stroke-width: 3px;
        }

        .breadcrumb-link {
            color: #4080ff;
            cursor: pointer;
        }

        .breadcrumb-link:hover {
            text-decoration: underline;
        }

        .breadcrumb-current {
            color: #ddd;
        }

        .breadcrumb-sep {
            color: #666;
        }

        #controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: nowrap;
            flex-shrink: 0;
        }

        #controls button {
            white-space: nowrap;
        }

        /* Open triggers the server-side file picker (works in Safari, preserves
           the real path). Styled distinctly from the plain buttons. */
        #open-btn {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: #4080ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            user-select: none;
            transition: background 0.2s;
        }

        #open-btn:hover {
            background: #5090ff;
        }

        /* Server-side file-picker modal */
        #file-picker[hidden] { display: none; }

        #file-picker {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #file-picker-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }

        #file-picker-dialog {
            position: relative;
            width: min(560px, 92vw);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            background: #2b2b2b;
            color: #eee;
            border: 1px solid #555;
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #file-picker-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid #444;
        }

        #file-picker-header h2 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
        }

        #file-picker-close {
            background: transparent;
            color: #bbb;
            font-size: 18px;
            line-height: 1;
            padding: 2px 8px;
        }

        #file-picker-path {
            padding: 6px 14px;
            font-size: 11px;
            color: #9ab;
            word-break: break-all;
            border-bottom: 1px solid #3a3a3a;
        }

        #file-picker-list {
            list-style: none;
            margin: 0;
            padding: 6px 0;
            overflow-y: auto;
            flex: 1;
        }

        .file-entry {
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-entry:hover { background: #3a4a66; }
        .file-dir { color: #cfa; }
        .file-patch { color: #eee; }

        .file-empty {
            padding: 14px;
            font-size: 12px;
            color: #999;
            list-style: none;
        }

        #file-picker-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 14px;
            border-top: 1px solid #444;
            font-size: 11px;
            color: #999;
        }

        #file-picker-upload {
            color: #7aa7ff;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Create-object modal (shares the file-picker's visual language) */
        #create-modal[hidden] { display: none; }

        #create-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #create-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }

        #create-modal-dialog {
            position: relative;
            width: min(420px, 92vw);
            background: #2b2b2b;
            color: #eee;
            border: 1px solid #555;
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #create-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid #444;
        }

        #create-modal-header h2 { margin: 0; font-size: 14px; font-weight: 600; }

        #create-modal-close {
            background: transparent;
            color: #bbb;
            font-size: 18px;
            line-height: 1;
            padding: 2px 8px;
        }

        #create-modal-body { padding: 14px; }

        #create-modal-input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            font-size: 13px;
            background: #1f1f1f;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
        }

        #create-modal-input:focus { outline: none; border-color: #4080ff; }

        #create-modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 14px 12px;
        }

        .create-modal-hint { font-size: 11px; color: #999; }

        #create-modal-ok {
            background: #4080ff;
            color: #fff;
            border: none;
        }
        #create-modal-ok:hover { background: #5090ff; }

        button {
            padding: 4px 10px;
            background: #4080ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover {
            background: #5090ff;
        }

        button.active {
            background: #ff8040;
        }

        #status {
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        #status.connected::before {
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            animation: pulse 2s ease-in-out infinite;
        }

        #status.disconnected::before {
            background: #f00;
            box-shadow: 0 0 8px #f00;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connected { color: #0f0; }
        .disconnected { color: #f00; }

        #canvas {
            padding: 20px;
            overflow: auto;
            height: calc(100vh - var(--header-height));
            background: #252525;
            cursor: crosshair;
        }

        /* Adjust canvas height when horizontal panel is visible (non-sidebar mode) */
        body:not(.sidebar-mode) #layout-controls.visible ~ #canvas {
            height: calc(100vh - var(--header-height) - 100px); /* header + panel */
        }

        svg {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            display: block;
            margin: 0 auto;
        }

        .box {
            cursor: move;
        }

        .box rect {
            transition: stroke 0.15s ease;
        }

        .box:hover rect {
            stroke: #4080ff;
            stroke-width: 2;
        }

        /* Subpatcher boxes have distinct styling */
        .box.has-subpatcher {
            cursor: pointer;
        }

        .box.has-subpatcher rect {
            fill: #f0f8ff !important;
            stroke: #4080ff;
            stroke-width: 2;
            stroke-dasharray: 4,2;
        }

        .box.has-subpatcher:hover rect {
            fill: #e6f2ff !important;
            stroke: #5090ff;
            stroke-width: 3;
        }

        .box.has-subpatcher text {
            fill: #4080ff;
            font-weight: bold;
        }

        /* Overlay input for editing an object's text in place (double-click). */
        .inline-edit {
            position: fixed;
            font-family: Monaco, Courier, monospace;
            font-size: 11px;
            padding: 2px 4px;
            border: 2px solid #4080ff;
            border-radius: 3px;
            background: #fff;
            color: #000;
            box-sizing: border-box;
            outline: none;
            z-index: 300;
        }

        /* Disable box hover when hovering over ports - ports have their own hover */
        .box:has(.port:hover) rect {
            stroke: #000;
            stroke-width: 1;
        }

        /* Disable hover when selected - selection takes priority */
        .box.selected:hover rect {
            stroke: #ff8040;
            stroke-width: 3;
        }

        /* Keep selected styling even when hovering over ports */
        .box.selected:has(.port:hover) rect {
            stroke: #ff8040;
            stroke-width: 3;
        }

        .box text {
            pointer-events: none;
            user-select: none;
        }

        .port {
            cursor: pointer;
            /* Only transition the hover/state colours -- NOT position (cx/cy),
               or ports lag behind the box during a drag. */
            transition: fill 0.15s ease, stroke 0.15s ease, stroke-width 0.15s ease;
        }

        .inlet:hover {
            fill: #5090ff !important;
            stroke-width: 2 !important;
        }

        .outlet:hover {
            fill: #ff9050 !important;
            stroke-width: 2 !important;
        }

        .port.selected {
            stroke: #ffff00 !important;
            stroke-width: 3 !important;
            filter: drop-shadow(0 0 4px rgba(255, 255, 0, 0.8));
        }

        #info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: linear-gradient(180deg, transparent 0%, #1e1e1e 30%);
            font-size: 11px;
            color: #888;
            text-align: center;
            pointer-events: none;
        }

        #info span {
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 4px;
            backdrop-filter: blur(10px);
        }

        .help-text {
            font-size: 11px;
            color: #888;
            margin-left: 20px;
        }

        #layout-controls {
            background: #2d2d2d;
            padding: 12px 20px;
            border-bottom: 1px solid #444;
            display: none;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        #layout-controls.visible {
            display: flex;
        }

        /* Sidebar mode styles */
        body.sidebar-mode #layout-controls {
            position: fixed;
            top: var(--header-height);
            right: -280px;
            width: 280px;
            height: auto;
            /* Size to content, but never taller than the viewport (scroll if so). */
            max-height: calc(100vh - var(--header-height));
            flex-direction: column;
            flex-wrap: nowrap;
            overflow-y: auto;
            border-bottom: none;
            border-left: 2px solid #4080ff;
            box-shadow: -2px 0 8px rgba(0,0,0,0.3);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 10px 16px;
            gap: 10px;
        }

        body.sidebar-mode #layout-controls.visible {
            right: 0;
        }

        body.sidebar-mode #canvas {
            padding-right: 20px;
            transition: padding-right 0.3s ease;
        }

        body.sidebar-mode.controls-visible #canvas {
            padding-right: 300px;
        }

        body.sidebar-mode #layout-controls .control-group {
            width: 100%;
        }

        body.sidebar-mode #layout-controls button {
            width: 100%;
            margin-top: 0 !important;
        }

        /* Small deliberate separator between the parameters and the action buttons. */
        body.sidebar-mode #layout-controls #apply-layout-btn {
            margin-top: 6px !important;
        }

        /* Collapsed sidebar indicator */
        body.sidebar-mode::after {
            content: '';
            position: fixed;
            top: var(--header-height);
            right: 0;
            bottom: 0;
            width: 1px;
            background: rgba(64, 128, 255, 0.3);
            z-index: 99;
            transition: opacity 0.3s ease;
        }

        body.sidebar-mode.controls-visible::after {
            opacity: 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .control-group label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input[type="range"] {
            width: 120px;
            height: 4px;
            background: #444;
            outline: none;
            border-radius: 2px;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: #4080ff;
            cursor: pointer;
            border-radius: 50%;
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #4080ff;
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }

        .control-group .value-display {
            font-size: 11px;
            color: #4080ff;
            font-weight: 500;
        }

        .control-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Advanced disclosure: a subtle section header (not a blue action button). */
        #advanced-toggle {
            background: transparent;
            color: #aaa;
            text-align: left;
            padding: 6px 0;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-top: 1px solid #444;
            border-radius: 0;
            cursor: pointer;
        }

        #advanced-toggle:hover {
            background: transparent;
            color: #fff;
        }

        /* When open, the wrapper dissolves so its groups join the panel's flex
           layout (preserving the per-engine show/hide and gap). When collapsed,
           display:none hides the whole subtree regardless of child overrides. */
        #advanced-body {
            display: contents;
        }

        #advanced-body.collapsed {
            display: none;
        }

        /* Parameter visibility based on layout engine - MUST come after .control-group */
        /* Default: hide elk params (tabindex=2), show cola params (tabindex=1) */
        #layout-controls .control-group.param-elk-only[tabindex="2"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        #layout-controls .control-group.param-cola-only[tabindex="1"] {
            display: flex !important;
            visibility: visible !important;
            height: auto !important;
            overflow: visible !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* When ELK is selected: hide cola params, show elk params */
        body.layout-engine-elk #layout-controls .control-group.param-cola-only[tabindex="1"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        body.layout-engine-elk #layout-controls .control-group.param-elk-only[tabindex="2"] {
            display: flex !important;
            visibility: visible !important;
            height: auto !important;
            overflow: visible !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* Default: hide dagre params */
        #layout-controls .control-group.param-dagre-only[tabindex="3"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* When Dagre is selected: hide cola/elk params, show dagre params */
        body.layout-engine-dagre #layout-controls .control-group.param-cola-only[tabindex="1"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        body.layout-engine-dagre #layout-controls .control-group.param-elk-only[tabindex="2"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        body.layout-engine-dagre #layout-controls .control-group.param-dagre-only[tabindex="3"] {
            display: flex !important;
            visibility: visible !important;
            height: auto !important;
            overflow: visible !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }
    </style>
</head>
<body class="layout-engine-elk" data-layout-engine="elk">
    <div id="header">
        <div id="header-title">
            <h1 id="title">py2max Interactive Editor</h1>
            <div id="breadcrumb">
                <span class="breadcrumb-icon">📁</span>
                <span id="breadcrumb-path">Loading...</span>
            </div>
        </div>
        <div id="controls">
            <button id="toggle-layout-mode-btn" title="Toggle between panel and sidebar layout">📋 Panel Mode</button>
            <button id="parent-btn" title="Go to parent patcher (ESC)">⬆️ Parent</button>
            <button id="fit-view-btn" title="Fit patch to view (F). Wheel to zoom, Space-drag to pan.">⤢ Fit</button>
            <button id="auto-layout-btn" title="Auto-arrange objects (layout engine is configurable)">🔄 Auto-Layout</button>
            <button id="toggle-comments-btn" title="Hide/show comment annotation nodes (does not delete them)">Hide Comments</button>
            <button id="open-btn" title="Open a .maxpat file from the server">📂 Open</button>
            <button id="save-btn" title="Save patch to .maxpat file">💾 Save</button>
            <button id="undo-btn" title="Undo (Cmd/Ctrl-Z)">↶ Undo</button>
            <button id="redo-btn" title="Redo (Cmd/Ctrl-Shift-Z)">↷ Redo</button>
            <button id="create-btn" title="Create new object">+ Object</button>
            <div id="status" class="disconnected">
                <span class="status-text">Connecting...</span>
            </div>
        </div>
    </div>

    <div id="layout-controls">
        <!-- Primary controls: enough for a good layout with the compact defaults. -->
        <div class="control-group param-shared">
            <label>Layout Engine</label>
            <select id="layout-engine" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                <option value="cola">WebCola (Force-Directed)</option>
                <option value="elk" selected>ELK (Layered + Ports)</option>
                <option value="dagre">Dagre (Hierarchical DAG)</option>
            </select>
        </div>
        <div class="control-group param-shared">
            <label>Flow Layout Direction</label>
            <select id="flow-direction" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                <option value="none">None</option>
                <option value="x">Horizontal (Left-to-Right)</option>
                <option value="x-reverse">Horizontal (Right-to-Left)</option>
                <option value="y" selected>Vertical (Top-to-Bottom)</option>
                <option value="y-reverse">Vertical (Bottom-to-Top)</option>
            </select>
        </div>

        <!-- Advanced: engine-internal parameters, collapsed by default. -->
        <button id="advanced-toggle" type="button" aria-expanded="false">+ Advanced</button>
        <div id="advanced-body" class="collapsed">
            <div class="control-group param-shared">
                <label>Flow Spacing</label>
                <input type="range" id="flow-spacing-slider" min="50" max="300" value="50" step="10">
                <span class="value-display" id="flow-spacing-value">50</span>
            </div>
            <div class="control-group param-cola-only" tabindex="1">
                <label>Constraint Preset</label>
                <select id="constraint-preset" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                    <option value="none">None</option>
                    <option value="horizontal-flow">Horizontal Flow</option>
                    <option value="vertical-flow">Vertical Flow</option>
                    <option value="grid">Grid Alignment</option>
                </select>
            </div>
            <div class="control-group param-cola-only" tabindex="1">
                <label>Link Distance</label>
                <input type="range" id="link-distance-slider" min="50" max="300" value="100" step="10">
                <span class="value-display" id="link-distance-value">100</span>
            </div>
            <div class="control-group param-cola-only" tabindex="1">
                <label>Iterations</label>
                <input type="range" id="iterations-slider" min="10" max="200" value="50" step="10">
                <span class="value-display" id="iterations-value">50</span>
            </div>
            <div class="control-group param-shared">
                <label>Canvas Width</label>
                <input type="range" id="canvas-width-slider" min="400" max="1600" value="400" step="50">
                <span class="value-display" id="canvas-width-value">400</span>
            </div>
            <div class="control-group param-shared">
                <label>Canvas Height</label>
                <input type="range" id="canvas-height-slider" min="300" max="1200" value="300" step="50">
                <span class="value-display" id="canvas-height-value">300</span>
            </div>
            <div class="control-group param-shared">
                <label>Min ViewBox Width</label>
                <input type="range" id="min-viewbox-width-slider" min="400" max="1600" value="400" step="50">
                <span class="value-display" id="min-viewbox-width-value">400</span>
            </div>
            <div class="control-group param-shared">
                <label>Min ViewBox Height</label>
                <input type="range" id="min-viewbox-height-slider" min="300" max="1200" value="300" step="50">
                <span class="value-display" id="min-viewbox-height-value">300</span>
            </div>
            <div class="control-group param-cola-only" tabindex="1">
                <label>Avoid Overlaps</label>
                <input type="checkbox" id="avoid-overlaps-checkbox" checked>
            </div>
            <div class="control-group param-elk-only" tabindex="2">
                <label>ELK Algorithm</label>
                <select id="elk-algorithm" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                    <option value="layered">Layered (Hierarchical)</option>
                    <option value="force">Force-Directed</option>
                    <option value="stress">Stress Minimization</option>
                    <option value="mrtree">Tree (Multi-Root)</option>
                </select>
            </div>
            <div class="control-group param-elk-only" tabindex="2">
                <label>Node Placement</label>
                <select id="elk-node-placement" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                    <option value="NETWORK_SIMPLEX">Network Simplex</option>
                    <option value="LINEAR_SEGMENTS">Linear Segments</option>
                    <option value="BRANDES_KOEPF">Brandes-Koepf</option>
                    <option value="SIMPLE">Simple</option>
                </select>
            </div>
            <div class="control-group param-elk-only" tabindex="2">
                <label>Edge Routing</label>
                <select id="elk-edge-routing" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                    <option value="ORTHOGONAL">Orthogonal</option>
                    <option value="POLYLINE">Polyline</option>
                    <option value="SPLINES">Splines</option>
                </select>
            </div>
            <div class="control-group param-dagre-only" tabindex="3">
                <label>Dagre Ranker</label>
                <select id="dagre-ranker" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                    <option value="network-simplex">Network Simplex (Default)</option>
                    <option value="tight-tree">Tight Tree</option>
                    <option value="longest-path">Longest Path</option>
                </select>
            </div>
            <div class="control-group param-dagre-only" tabindex="3">
                <label>Dagre Align</label>
                <select id="dagre-align" style="padding: 4px 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; cursor: pointer;">
                    <option value="">None (Default)</option>
                    <option value="UL">Upper Left</option>
                    <option value="UR">Upper Right</option>
                    <option value="DL">Down Left</option>
                    <option value="DR">Down Right</option>
                </select>
            </div>
        </div>

        <button id="apply-layout-btn" style="margin-top: 14px;">Apply Layout</button>
        <button id="reset-layout-btn" style="margin-top: 14px;">Reset Layout</button>
    </div>

    <!-- Server-side file picker modal. Lists patch files/folders on the server
         so Open works in Safari and preserves the real path for save-back. -->
    <div id="file-picker" hidden>
        <div id="file-picker-backdrop"></div>
        <div id="file-picker-dialog" role="dialog" aria-modal="true" aria-label="Open a patch">
            <div id="file-picker-header">
                <h2>Open a patch</h2>
                <button id="file-picker-close" title="Close (Esc)">&times;</button>
            </div>
            <div id="file-picker-path"></div>
            <ul id="file-picker-list"></ul>
            <div id="file-picker-footer">
                <span id="file-picker-status"></span>
                <label id="file-picker-upload" for="file-input"
                       title="Upload from this browser instead (fallback)">Upload from browser</label>
            </div>
        </div>
    </div>

    <!-- Create-object modal (replaces window.prompt): a text field with a
         typeahead of common Max objects. -->
    <div id="create-modal" hidden>
        <div id="create-modal-backdrop"></div>
        <div id="create-modal-dialog" role="dialog" aria-modal="true" aria-label="Create object">
            <div id="create-modal-header">
                <h2>New object</h2>
                <button id="create-modal-close" title="Cancel (Esc)">&times;</button>
            </div>
            <div id="create-modal-body">
                <input id="create-modal-input" type="text" list="max-object-list"
                       placeholder="Object name, e.g. cycle~ 440" autocomplete="off"
                       spellcheck="false">
                <datalist id="max-object-list"></datalist>
            </div>
            <div id="create-modal-footer">
                <span class="create-modal-hint">Enter to create, Esc to cancel</span>
                <button id="create-modal-ok">Create</button>
            </div>
        </div>
    </div>

    <!-- Native upload input, used as a fallback via the picker's "Upload from
         browser" link. Kept rendered but hidden off-screen: Safari ignores
         .click() on a display:none file input, so we can't hide it that way. -->
    <input type="file" id="file-input"
           accept=".maxpat,.maxhelp,.amxd,.json,application/json"
           style="position: absolute; width: 1px; height: 1px;
                  opacity: 0; overflow: hidden; pointer-events: none;">

    <div id="canvas"></div>

    <div id="info">
        <span id="info-text">Initializing...</span>
    </div>

    <!-- External libraries -->
    <script src="d3.v7.min.js"></script>
    <script src="svg.min.js"></script>
    <script src="cola.min.js"></script>
    <script src="elk.bundled.js"></script>
    <script src="dagre-bundle.js"></script>

    <!-- Main interactive editor -->
    <script src="interactive.js"></script>
</body>
</html>
